# TiddlyWiki Home Assistant Add-on Configuration
name: TiddlyWiki
version: "1.0.3"
slug: tiddlywiki
description: "TiddlyWiki personal wiki system with server-side saving"
url: "https://github.com/BenSweaterVest/HomeAssistantTiddlyWiki"
# Supported architectures
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
# Addon lifecycle configuration
init: false
startup: services
boot: auto
# Home Assistant ingress support
ingress: true
ingress_port: 8080
# Web UI configuration - provides "Open Web UI" button in HA
webui: "http://[HOST]:[PORT:8080]"
# Watchdog enables automatic restart on crash
watchdog: "tcp://[HOST]:[PORT:8080]"
# Port configuration
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "TiddlyWiki web interface (host port configurable in Network settings)"
# Directory mappings for data persistence
map:
  - "share:rw"
  - "backup:rw"
# Default configuration options
options:
  auth_mode: "none"
  username: ""
  password: ""
  log_level: "info"
# Configuration schema with validation
schema:
  auth_mode: "list(none|edit|all)?"
  username: "str?"
  password: "password?"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)?"
# Docker image reference for the official repository. Forks that publish to a
# different GHCR namespace must update this path to match their own images.
image: "ghcr.io/bensweatervest/{arch}-hassio-tiddlywiki"
