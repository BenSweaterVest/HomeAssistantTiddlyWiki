name: Build TiddlyWiki Add-on

'on':
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.arch }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.20
          - arch: armhf
            platform: linux/arm/v6
            build_from: ghcr.io/home-assistant/armhf-base:3.20
          - arch: armv7
            platform: linux/arm/v7
            build_from: ghcr.io/home-assistant/armv7-base:3.20
          - arch: i386
            platform: linux/386
            build_from: ghcr.io/home-assistant/i386-base:3.20
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Compute build metadata
        id: vars
        run: |
          echo "namespace=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path
          content = Path("tiddlywiki/config.yaml").read_text(encoding="utf-8")
          match = re.search(r'^version:\s*"?([^"\n]+)"?\s*$', content, re.MULTILINE)
          if not match:
              raise SystemExit("Could not parse version from tiddlywiki/config.yaml")
          print(f"version={match.group(1)}")
          PY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push add-on image
        uses: docker/build-push-action@v7
        with:
          context: ./tiddlywiki
          file: ./tiddlywiki/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.namespace }}/${{ matrix.arch }}-hassio-tiddlywiki:${{ steps.vars.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.namespace }}/${{ matrix.arch }}-hassio-tiddlywiki:latest
